---
- name: Install pimsync
  community.general.pacman:
    name: pimsync
    state: present

- name: Install khard
  community.general.pacman:
    name: khard
    state: present

- name: Install khal
  community.general.pacman:
    name: khal
    state: present

- name: Install etesync-dav
  kewlfft.aur.aur:
    name: etesync-dav
  become: true
  become_user: "{{ aur.user }}"
  tags:
    - aur
  when: etesync is defined and etesync

- name: Push etesync-dav service file
  ansible.builtin.copy:
    src: etesync-dav.service
    dest: /etc/systemd/user/etesync-dav.service
    mode: "0644"
  notify:
    - Reload systemd config
  when: etesync is defined and etesync

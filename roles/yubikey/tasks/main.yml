---
- name: Install YubiKey Personalization GUI
  community.general.pacman:
    name: yubikey-personalization-gui
    state: present

- name: Install YubiKey Manager
  community.general.pacman:
    name: yubikey-manager
    state: present

- name: Install smartcard libs/tools
  community.general.pacman:
    name:
      - pcsclite
      - libusb-compat
      - ccid
    state: present

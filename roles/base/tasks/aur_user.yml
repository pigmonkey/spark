---
- name: Create AUR user
  ansible.builtin.user:
    name: "{{ aur.user }}"
    create_home: true
    group: wheel
  tags:
    - aur

- name: Allow passwordless Pacman for AUR user
  ansible.builtin.template:
    src: sudo_aur.j2
    dest: /etc/sudoers.d/11-aur
    mode: "0644"
    validate: "visudo -cf %s"
  tags:
    - aur
    - sudo

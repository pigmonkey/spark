---
- name: Enable dvorak for XOrg libinput
  ansible.builtin.template:
    src: 40-libinput-dvorak.conf.j2
    dest: /etc/X11/xorg.conf.d/40-libinput-dvorak.conf
    mode: "0644"

- name: Add control-caps dvorak keymap
  ansible.builtin.copy:
    src: dvorak-cc.map.gz
    dest: /usr/share/kbd/keymaps/i386/dvorak/dvorak-cc.map.gz
    mode: "0644"

- name: Enable dvorak-cc for vconsole
  ansible.builtin.lineinfile:
    dest: /etc/vconsole.conf
    regexp: ^KEYMAP=
    state: present
    line: "KEYMAP=dvorak-cc"

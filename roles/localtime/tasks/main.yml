---
- name: Install localtime
  kewlfft.aur.aur:
    name: localtime-git
  become: true
  become_user: "{{ aur.user }}"
  tags:
    - aur

- name: Include nmtrust unit tasks
  ansible.builtin.include_tasks: roles/nmtrust/tasks/unit.yml
  vars:
    unit: localtime.service
    run_on: "{{ localtime.run_on }}"

---
- name: Install Okular
  community.general.pacman:
    name: okular
    state: present
  tags:
    - okular

- name: Jail Okular
  ansible.builtin.file:
    src: /usr/bin/firejail
    dest: /usr/local/bin/okular
    state: link
  tags:
    - okular
    - firejail

- name: Verify Okular firejail local profile exists
  ansible.builtin.copy:
    content: ""
    dest: /etc/firejail/okular.local
    force: false
    mode: "0644"
  tags:
    - okular
    - firejail

- name: Restrict Okular network access
  ansible.builtin.lineinfile:
    dest: /etc/firejail/okular.local
    regexp: "^net"
    line: "net none"
  tags:
    - okular
    - firejail

- name: Install Zathura and dependencies
  community.general.pacman:
    name:
      - zathura-cb
      - zathura-pdf-mupdf
      - zathura-ps
    state: present
  tags:
    - zathura

- name: Set Zathura as default PDF viewer
  ansible.builtin.lineinfile:
    dest: /etc/xdg/mimeapps.list
    regexp: "^application/pdf"
    state: present
    line: "application/pdf=org.pwmt.zathura-pdf-mupdf.desktop"
  tags:
    - zathura

- name: Jail Zathura
  ansible.builtin.file:
    src: /usr/bin/firejail
    dest: /usr/local/bin/zathura
    state: link
  tags:
    - zathura
    - firejail

- name: Install pdfgrep
  community.general.pacman:
    name: pdfgrep
    state: present
  tags:
    - pdfgrep

- name: Install OCRmyPDF and dependencies
  kewlfft.aur.aur:
    name:
      - python-uharfbuzz
      - python-fpdf2
      - ocrmypdf
  become: true
  become_user: "{{ aur.user }}"
  tags:
    - ocrmypdf
    - aur

- name: Install tesseract-data-eng
  community.general.pacman:
    name: tesseract-data-eng
    state: present
  tags:
    - ocrmypdf

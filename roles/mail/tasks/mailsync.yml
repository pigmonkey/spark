---
- name: Push mail sync script
  ansible.builtin.template:
    src: mailsync.sh.j2
    dest: /usr/local/bin/mailsync
    mode: "0755"
  tags:
    - mailsync

- name: Push mailsync service file
  ansible.builtin.template:
    src: mailsync.service.j2
    dest: /etc/systemd/user/mailsync.service
    mode: "0644"
  tags:
    - mailsync
  notify:
    - Reload systemd config

- name: Push mailsync timer file
  ansible.builtin.template:
    src: mailsync.timer.j2
    dest: /etc/systemd/user/mailsync.timer
    mode: "0644"
  tags:
    - mailsync
  notify:
    - Reload systemd config
    - Restart mailsync

- name: Include nmtrust unit tasks
  ansible.builtin.include_tasks: roles/nmtrust/tasks/unit.yml
  vars:
    unit: mailsync.timer
    run_on: "{{ mail.sync_on }}"
    user_unit: true
  tags:
    - mailsync
